<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="weather.css" />
</head>
<body>

  <div class="card">
    <h1>⛅ Weather App</h1>

    <div class="search">
      <input type="text" id="cityInput" placeholder="Enter city name..." />
      <button onclick="searchWeather()">Search</button>
    </div>

    <div id="error" class="error hidden">❌ City not found. Try again.</div>

    <div id="result" class="result hidden">
      <h2 id="cityName"></h2>
      <p id="country"></p>
      <div class="temp-box">
        <span id="temp"></span>
        <img id="icon" src="" alt="icon" />
      </div>
      <p id="description"></p>
      <div class="details">
        <div><span>Feels Like</span><strong id="feelsLike"></strong></div>
        <div><span>Humidity</span><strong id="humidity"></strong></div>
        <div><span>Wind</span><strong id="wind"></strong></div>
        <div><span>Min / Max</span><strong id="minMax"></strong></div>
      </div>
    </div>
  </div>

  <script src="weather.js"></script>
</body>
</html>
